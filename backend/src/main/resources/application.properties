server.port=8080

# Oracle — lido das variáveis de ambiente injetadas pelo docker-compose
spring.datasource.url=${ORACLE_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${ORACLE_USER:system}
spring.datasource.password=${ORACLE_PASS:hackgov123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Aguarda Oracle ficar disponível antes de falhar
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# update: cria/ajusta tabelas automaticamente (use validate só em prod com schema fixo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

logging.level.br.com.hackgov=INFO
