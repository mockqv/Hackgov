services:

  # ── BACKEND — Spring Boot ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: hackgov-backend
    ports:
      # host 8081 -> container 8080 (8080 do host fica livre pro Oracle APEX/outros)
      - "8081:8080"
    environment:
      ORACLE_URL: jdbc:oracle:thin:@192.168.0.4:1521/XEPDB1
      ORACLE_USER: hackgov
      ORACLE_PASS: hackgov123
      SPRING_PROFILES_ACTIVE: dev
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 90s

  # ── FRONTEND — React + Vite ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: hackgov-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure
