version: "3.9"

services:

  # ── BACKEND — Spring Boot ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: hackgov-backend
    ports:
      - "8080:8080"
    environment:
      ORACLE_URL: jdbc:oracle:thin:@host.docker.internal:1521:XE
      ORACLE_USER: hackgov
      ORACLE_PASS: hackgov123
      SPRING_PROFILES_ACTIVE: prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ── FRONTEND — React + Vite ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: hackgov-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:8080
    restart: on-failure
